spring.application.name=inventoryService
server.port=8083

spring.datasource.url=${POSTGRES_DATABASE_URL:jdbc:postgresql://localhost:5432/ecom_inventory}
spring.datasource.username=${POSTGRES_DATABASE_USERNAME:postgres}
spring.datasource.password=${POSTGRES_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.sql.init.mode=always
#spring.jpa.defer-datasource-initialization=true

eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8080/eureka/}
eureka.instance.prefer-ip-address=true

jwt.secret=${JWT_SECRET:secret key for creating jwt token}