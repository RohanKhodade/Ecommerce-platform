spring.application.name=userService
server.port=8081

# Database connection
spring.datasource.url=${POSTGRES_DATABASE_URL:jdbc:postgresql://localhost:5432/ecom_users}
spring.datasource.username=${POSTGRES_DATABASE_USERNAME:postgres}
spring.datasource.password=${POSTGRES_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Connection pool (optional but good practice - HikariCP is default)
spring.datasource.hikari.maximum-pool-size=10

#eureka service fetch and register
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8080/eureka/}
eureka.instance.prefer-ip-address=true

jwt.secret=${JWT_SECRET:secret key for creating jwt token}