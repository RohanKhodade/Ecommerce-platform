spring.application.name=apiGateway
server.port=${SERVER_PORT:8079}

eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8080/eureka/}

management.endpoint.gateway.enabled=true
management.endpoints.web.exposure.include=*

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true


# currently api is the only one to talk to browser therefore we need cors config
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=${CORS_URL:http://localhost:5173}
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true

#Route 1  userService
spring.cloud.gateway.server.webflux.routes[0].id=userService
spring.cloud.gateway.server.webflux.routes[0].uri=lb://userService
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/user/**,/api/auth/**

#  route 2 order service
spring.cloud.gateway.server.webflux.routes[1].id=orderService
spring.cloud.gateway.server.webflux.routes[1].uri=lb://orderService
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/order/**,/api/cart/**

# route 3 inventory service
spring.cloud.gateway.server.webflux.routes[2].id=inventoryService
spring.cloud.gateway.server.webflux.routes[2].uri=lb://inventoryService
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/inventory/**,/api/category/**,/api/category/

# route 4 payment service
spring.cloud.gateway.server.webflux.routes[3].id=paymentService
spring.cloud.gateway.server.webflux.routes[3].uri=lb://paymentService
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/payment/**

